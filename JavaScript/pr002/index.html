<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora (Básica)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="3233478.png" type="image/x-icon">
</head>
<body>
    <main>
        <h1>Calculadora</h1>
        <input type="number" name="num1" id="num1" class="input-number">
        <input type="number" name="num2" id="num2" class="input-number">
        <input type="button" value="Somar" id="input-button" onclick="somar()">
        <div id="quad-div">O resultado está aqui:</div>
    </main>

    <script>
        function somar() {
        var num1 = window.document.getElementById('num1')
        var num2 = window.document.getElementById('num2')
        var quad = window.document.getElementById('quad-div')
        var n1 = Number(num1.value)
        var n2 = Number(num2.value)
        var total = n1 + n2
        quad.innerHTML = `A soma dos valores inseridos é: <strong>${total}</strong>`
        }
    </script>
</body>
</html>
